<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140" fill="none">
  <rect width="480" height="140" fill="#0a0a14"/>
  
  <!-- Logomark: elegant D with flowing fabric drape -->
  <g transform="translate(20, 12)">
    <rect x="0" y="0" width="116" height="116" rx="26" fill="url(#g1)"/>
    
    <!-- D vertical stem - slightly tapered -->
    <path d="M34 26 L34 90" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
    
    <!-- D curve - elegant, slightly asymmetric like real drape -->
    <path d="M34 26 C42 26, 56 27, 66 32 C78 38, 84 48, 84 58 C84 68, 78 78, 66 84 C56 89, 42 90, 34 90" stroke="#fff" stroke-width="8" stroke-linecap="round" fill="none"/>
    
    <!-- Flowing drape folds - 3 graceful curves suggesting falling fabric -->
    <path d="M46 34 C50 40, 54 48, 52 58 C50 68, 46 76, 44 82" stroke="rgba(255,255,255,0.35)" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M56 38 C60 44, 64 50, 63 58 C62 66, 58 74, 54 80" stroke="rgba(255,255,255,0.22)" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <path d="M64 44 C68 50, 70 54, 69 58 C68 64, 64 70, 62 74" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  </g>
  
  <!-- "Drape" - capitalized D, clean modern -->
  <text x="154" y="72" font-family="'Space Grotesk', 'SF Pro Display', system-ui, sans-serif" font-size="52" font-weight="700" letter-spacing="-1" fill="#ffffff">Drape</text>
  
  <!-- "Studio" - lighter weight, elegant spacing -->
  <text x="156" y="106" font-family="'Inter', 'SF Pro Text', system-ui, sans-serif" font-size="19" font-weight="400" letter-spacing="6" fill="#6b6b80">STUDIO</text>
  
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="116" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b7cf7"/>
      <stop offset="50%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#00cec9"/>
    </linearGradient>
  </defs>
</svg>
